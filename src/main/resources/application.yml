server:
  port: ${PORT:8080}

spring:
  profiles:
    active: local
  datasource:
#    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:fast_food}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
#    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
#    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost/fast_food
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
